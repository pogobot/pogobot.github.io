        <!-- NAVBAR -->
        <div class="navbar navbar-default navbar-fixed-top" style="margin-bottom: 5vh;">
            <div class="col-12 d-flex flex-row align-items-center justify-content-between">

                <a class="heading-brand text-success" href="index.html">

                <div class="col-md-8 d-flex flex-row align-items-center justify-content-end">

        <div id="file1" style="display:block; width:100%; height:auto;">

        <div id="file2" style="display:none; width:100%; height:auto;">
        <div id="md2"></div>

        <div id="file3" style="display:none; width:100%; height:auto;">
        <div id="md3"></div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

        <script>
        async function loadMarkdown(targetId, filePath) {
            const res = await fetch(filePath);
            let md = await res.text();

            const base = "https://github.com/nekonaute/pogobot/tree/doc_refresh_0526/";

            const html = marked.parse(md);

            const container = document.createElement("div");
            container.innerHTML = html;

            container.querySelectorAll("img").forEach(img => {
                const src = img.getAttribute("src");

                if (src && !src.startsWith("http") && !src.startsWith("/")) {
                img.setAttribute("src", base + src);
                }

                // also fix ../ paths
                if (src && src.startsWith("../")) {
                img.setAttribute("src", base + src.replace(/^\.\.\//, ""));
                }
            });

            document.getElementById(targetId).innerHTML = container.innerHTML;
            }

        // load all docs
        loadMarkdown("md1", "pogobot/docs/SoftwareUserGuide.md");
        loadMarkdown("md2", "pogobot/docs/RobotAssembly.md");
        loadMarkdown("md3", "pogobot/docs/IR-Remote.md");
        </script>

        <div id="file4"
             style="display:none; width:100%; height:auto; overflow:visible;"
             markdown="1">

            <embed
                src="pogobot/Software/docs/doxygen/html/pogobot_8h.html"
                style="display:block; width:100%; min-height:100vh; border:none;">
        </div>

    </div>
</section>

<script>
function showFile(fileId)
{
    document.getElementById('file1').style.display = 'none';
    document.getElementById('file2').style.display = 'none';
    document.getElementById('file3').style.display = 'none';

    document.getElementById(fileId).style.display = 'block';
}
</script>
